<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Figma Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="debug">

  <header class="header">
    <div class="logo">LOGO</div>

    <nav class="nav">
      <a href="#">Produtos</a>
      <a href="#">Soluções</a>
      <a href="#">Comunidade</a>
      <a href="#">Recursos</a>
      <a href="#">Preços</a>
    </nav>

    <div class="actions">
      <a href="#" class="login">Entrar</a>
      <button class="btn-outline">Fale com a equipe</button>
      <button class="btn-primary">Comece sem custos</button>
    </div>
  </header>

  <main>
    <section class="hero">
      
      <div class="hero-text">
        <h1>Figma Design</h1>
        <p>
          O Figma é uma ferramenta de design poderosa e colaborativa
          para equipes. Explore ideias e obtenha feedback, crie protótipos
          realistas e otimize o desenvolvimento de produtos.
        </p>

        <div class="hero-buttons">
          <button class="btn-primary">Comece agora</button>
          <button class="btn-outline">Fale com a equipe de vendas</button>
        </div>
      </div>

      <div class="hero-image">
        <div class="mock-shape"></div>
      </div>

    </section>
  </main>

  <footer class="footer">
    Footer
  </footer>

</body>
</html>
